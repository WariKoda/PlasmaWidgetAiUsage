name: lint

on:
  push:
  pull_request:

jobs:
  python:
    name: Python helper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile helper
        run: python3 -m py_compile package/contents/code/ai-usage-json
      - name: Ruff (best effort)
        run: |
          pip install ruff
          ruff check package/contents/code/ai-usage-json || true

  qml:
    name: QML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6 qmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y qml6-module-qtqml qt6-declarative-dev-tools
      - name: qmllint
        run: |
          # Plasma/Kirigami modules are not installed in CI, so unresolved-import
          # and i18n warnings are expected; we only fail on syntax errors.
          set +e
          fail=0
          for f in $(find package/contents -name '*.qml'); do
            out=$(qmllint "$f" 2>&1)
            echo "$out" | grep -qiE 'error:' && { echo "$out"; fail=1; }
          done
          exit $fail
